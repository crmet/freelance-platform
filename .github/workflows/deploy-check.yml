name: Deployment Check

on:
  workflow_run:
    workflows: ["CI/CD"]
    types:
      - completed

jobs:
  check:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: ubuntu-latest

    steps:
      - name: Wait for Railway
        run: sleep 30

      - name: Check API
        run: |
          curl --fail https://freelance-platform-production.up.railway.app/api/tasks

      - name: Check Website
        run: |
          curl --fail https://freelance-platform-production.up.railway.app