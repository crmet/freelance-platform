name: Deployment Check

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

jobs:
  check:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on: ubuntu-latest

    steps:
      - name: Wait for deploy (Railway cold start)
        run: sleep 90

      - name: Check API
        run: |
          for i in {1..20}; do
            echo "Attempt $i..."

            if curl -sf https://freelance-platform-production.up.railway.app/api/tasks; then
              echo "API OK"
              exit 0
            fi

            sleep 10
          done

          echo "API failed after retries"
          exit 1

      - name: Check Website
        run: |
          for i in {1..10}; do
            if curl -sf https://freelance-platform-production.up.railway.app; then
              echo "Website OK"
              exit 0
            fi

            sleep 10
          done

          exit 1